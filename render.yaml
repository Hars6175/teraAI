services:
  # 1) MinIO Storage
  - type: web
    name: minio
    env: docker
    dockerfilePath: deploy/minio/Dockerfile
    plan: free
    envVars:
      - key: MINIO_ROOT_USER
        value: minioadmin
      - key: MINIO_ROOT_PASSWORD
        value: minioadmin
      - key: PORT
        value: 9000

  # 2) FastAPI Backend API
  - type: web
    name: api
    env: docker
    dockerfilePath: api/Dockerfile
    plan: free
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: ARQ_WORKERS
        value: "0"
      - key: ENABLE_ARI
        value: "false"
      - key: ENABLE_CAMPAIGN
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: redis
          property: connectionString
      - key: OSS_JWT_SECRET
        generateValue: true
      - key: BACKEND_API_ENDPOINT
        fromService:
          type: web
          name: api
          property: host
      - key: MINIO_ENDPOINT
        value: minio:9000
      - key: MINIO_PUBLIC_ENDPOINT
        fromService:
          type: web
          name: minio
          property: host
      - key: MINIO_ACCESS_KEY
        value: minioadmin
      - key: MINIO_SECRET_KEY
        value: minioadmin
      - key: MINIO_BUCKET
        value: voice-audio
      - key: MINIO_SECURE
        value: "false"

  # 3) Next.js Frontend UI
  - type: web
    name: ui
    env: docker
    rootDir: ui
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: BACKEND_URL
        value: http://api:8000
      - key: NODE_ENV
        value: production

  # 4) Redis Cache (Managed by Render)
  - type: redis
    name: redis
    plan: free
    ipAllowList: []

databases:
  # PostgreSQL Database (Managed by Render)
  - name: postgres
    plan: free
    ipAllowList: []
